name: Lockroot CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    name: Android build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          set +o pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          set -o pipefail

      - name: Install Android SDK packages
        shell: bash
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Make Gradle executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Create temporary Android release signing key
        shell: bash
        run: |
          set -euo pipefail
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore ci-release-upload.p12 \
            -storepass temporary-ci-release-password \
            -alias lockroot-ci-release \
            -keypass temporary-ci-release-password \
            -keyalg RSA \
            -keysize 4096 \
            -validity 30 \
            -dname "CN=Lockroot CI Release,O=Lockroot,C=US"
          cat > key.properties <<'EOF'
          storeFile=ci-release-upload.p12
          storePassword=temporary-ci-release-password
          keyAlias=lockroot-ci-release
          keyPassword=temporary-ci-release-password
          EOF

      - name: Build Android release artifacts
        shell: bash
        run: ./gradlew --no-daemon -Dorg.gradle.java.home="$JAVA_HOME" clean testReleaseUnitTest assembleRelease bundleRelease

      - name: Collect Android artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/android
          cp app/build/outputs/apk/release/*.apk ci-artifacts/android/Lockroot-android-release.apk
          cp app/build/outputs/bundle/release/*.aab ci-artifacts/android/Lockroot-android-release.aab
          (cd ci-artifacts/android && sha256sum Lockroot-android-release.apk Lockroot-android-release.aab > Lockroot-android-SHA256SUMS.txt)

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lockroot-android
          path: ci-artifacts/android/
          retention-days: 14

  windows:
    name: Windows release installer build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore Windows app
        shell: pwsh
        run: dotnet restore .\windows\Lockroot.Windows\Lockroot.Windows.csproj --configfile .\windows\Lockroot.Windows\NuGet.Config -r win-x64

      - name: Publish Windows app
        shell: pwsh
        run: dotnet publish .\windows\Lockroot.Windows\Lockroot.Windows.csproj -c Release -r win-x64 --self-contained true --no-restore

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          $candidates = @(
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            $command = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($command) {
              $iscc = $command.Source
            }
          }
          if (-not $iscc) {
            throw "ISCC.exe was not found after installing Inno Setup."
          }
          & $iscc .\windows\installer\lockroot.iss

      - name: Collect Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force ci-artifacts\windows | Out-Null
          Copy-Item .\windows\installer\output\LockrootSetup-*.exe ci-artifacts\windows\Lockroot-windows-setup.exe
          $hash = Get-FileHash ci-artifacts\windows\Lockroot-windows-setup.exe -Algorithm SHA256
          "$($hash.Hash.ToLower())  Lockroot-windows-setup.exe" | Set-Content -Encoding ascii ci-artifacts\windows\Lockroot-windows-SHA256SUMS.txt

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: lockroot-windows
          path: ci-artifacts/windows/
          retention-days: 14

  linux:
    name: Linux release build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore Linux app
        shell: bash
        run: dotnet restore ./linux/Lockroot.Linux/Lockroot.Linux.csproj --configfile ./linux/Lockroot.Linux/NuGet.Config -r linux-x64

      - name: Publish Linux app
        shell: bash
        run: dotnet publish ./linux/Lockroot.Linux/Lockroot.Linux.csproj -c Release -r linux-x64 --self-contained true --no-restore -p:UsedAvaloniaProducts= -p:PublishSingleFile=false

      - name: Collect Linux artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/linux
          PUBLISH_DIR="linux/Lockroot.Linux/bin/Release/net8.0/linux-x64/publish"
          tar -C "$PUBLISH_DIR" -czf ci-artifacts/linux/Lockroot-linux-x64.tar.gz .
          (cd ci-artifacts/linux && sha256sum Lockroot-linux-x64.tar.gz > Lockroot-linux-SHA256SUMS.txt)

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: lockroot-linux
          path: ci-artifacts/linux/
          retention-days: 14
