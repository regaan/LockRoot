name: Lockroot GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to attach artifacts to, for example v1.0.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  android:
    name: Android release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          set +o pipefail
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          set -o pipefail

      - name: Install Android SDK packages
        shell: bash
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Make Gradle executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Create temporary Android release signing key
        shell: bash
        run: |
          set -euo pipefail
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore ci-release-upload.p12 \
            -storepass temporary-ci-release-password \
            -alias lockroot-ci-release \
            -keypass temporary-ci-release-password \
            -keyalg RSA \
            -keysize 4096 \
            -validity 30 \
            -dname "CN=Lockroot CI Release,O=Lockroot,C=US"
          cat > key.properties <<'EOF'
          storeFile=ci-release-upload.p12
          storePassword=temporary-ci-release-password
          keyAlias=lockroot-ci-release
          keyPassword=temporary-ci-release-password
          EOF

      - name: Build Android release APK and AAB
        shell: bash
        run: ./gradlew --no-daemon -Dorg.gradle.java.home="$JAVA_HOME" clean testReleaseUnitTest assembleRelease bundleRelease

      - name: Collect Android release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/android
          cp app/build/outputs/apk/release/*.apk release-artifacts/android/Lockroot-android-release.apk
          cp app/build/outputs/bundle/release/*.aab release-artifacts/android/Lockroot-android-release.aab
          (cd release-artifacts/android && sha256sum Lockroot-android-release.apk Lockroot-android-release.aab > Lockroot-android-SHA256SUMS.txt)

      - name: Upload Android release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: release-artifacts/android/

  ios:
    name: iOS simulator release artifact
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/Lockroot/Lockroot.xcodeproj \
            -scheme Lockroot

      - name: Build iOS simulator release app
        run: |
          xcodebuild clean build \
            -project ios/Lockroot/Lockroot.xcodeproj \
            -scheme Lockroot \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package iOS simulator app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/ios
          app_path="build/ios/Build/Products/Release-iphonesimulator/Lockroot.app"
          test -d "$app_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" release-artifacts/ios/Lockroot-iOS-simulator.app.zip
          (cd release-artifacts/ios && shasum -a 256 Lockroot-iOS-simulator.app.zip > Lockroot-ios-simulator-SHA256SUMS.txt)

      - name: Upload iOS release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ios-simulator
          path: release-artifacts/ios/

  windows:
    name: Windows release installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore Windows app
        shell: pwsh
        run: dotnet restore .\windows\Lockroot.Windows\Lockroot.Windows.csproj --configfile .\windows\Lockroot.Windows\NuGet.Config

      - name: Publish Windows app
        shell: pwsh
        run: dotnet publish .\windows\Lockroot.Windows\Lockroot.Windows.csproj -c Release -r win-x64 --self-contained true --no-restore

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          $candidates = @(
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            $command = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($command) {
              $iscc = $command.Source
            }
          }
          if (-not $iscc) {
            throw "ISCC.exe was not found after installing Inno Setup."
          }
          & $iscc .\windows\installer\lockroot.iss

      - name: Collect Windows release artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-artifacts\windows | Out-Null
          Copy-Item .\windows\installer\output\LockrootSetup-*.exe release-artifacts\windows\Lockroot-windows-setup.exe
          $hash = Get-FileHash release-artifacts\windows\Lockroot-windows-setup.exe -Algorithm SHA256
          "$($hash.Hash.ToLower())  Lockroot-windows-setup.exe" | Set-Content -Encoding ascii release-artifacts\windows\Lockroot-windows-SHA256SUMS.txt

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release-artifacts/windows/

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - android
      - ios
      - windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release notes
        shell: bash
        run: |
          cp RELEASE_NOTES.md release-notes.md

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-artifacts -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release artifacts found."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" \
              --title "Lockroot $RELEASE_TAG" \
              --notes-file release-notes.md
          fi
