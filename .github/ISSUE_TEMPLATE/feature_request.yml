name: Feature request
description: Suggest a Lockroot improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Lockroot do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Vault
        - Crypto
        - Import/export
        - Password generator
        - UI
        - Documentation
        - Build/release
        - Other
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security impact
      description: Does this affect encryption, storage, clipboard, permissions, or lock behavior?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
