name: Bug report
description: Report a non-security bug in Lockroot
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Use SECURITY.md for private reporting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give exact steps.
      placeholder: |
        1. Open Lockroot
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: android
    attributes:
      label: Android version
      placeholder: "Android 15"
  - type: input
    id: device
    attributes:
      label: Device or emulator
      placeholder: "Pixel 8 emulator"
  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Do not paste passwords, vault files, or export files.
